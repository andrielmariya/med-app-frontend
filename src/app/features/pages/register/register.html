<div class="flex items-center justify-center min-h-screen p-4 text-14">
    <div class="glass-card w-full max-w-md relative overflow-hidden">
        <div
            class="absolute top-[-50px] left-[-50px] w-32 h-32 bg-indigo-500 rounded-full mix-blend-multiply filter blur-2xl opacity-50 animate-pulse">
        </div>
        <div
            class="absolute bottom-[-50px] right-[-50px] w-32 h-32 bg-primary-500 rounded-full mix-blend-multiply filter blur-2xl opacity-50 animate-pulse animation-delay-2000">
        </div>

        <div class="flex flex-col items-center mb-8 relative z-10">
            <div
                class="w-16 h-16 bg-gradient-to-br from-indigo-500 to-primary-600 rounded-2xl flex items-center justify-center mb-4 shadow-lg shadow-indigo-500/30">
                <lucide-icon [img]="UserPlusIcon" class="text-white" size="32"></lucide-icon>
            </div>
            <h2 class="text-15 font-bold text-white text-center">Create Account</h2>
            <p class="text-slate-400 text-center mt-2 text-13">Join our digital health companion</p>
        </div>

        <div *ngIf="error"
            class="bg-red-500/10 border border-red-500/50 text-red-400 p-3 rounded-xl mb-6 text-13 text-center relative z-10">
            {{error}}
        </div>
        <div *ngIf="success"
            class="bg-green-500/10 border border-green-500/50 text-green-400 p-3 rounded-xl mb-6 text-13 text-center relative z-10">
            {{success}}
        </div>

        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-5 relative z-10">
            <div>
                <label class="block text-13 font-medium text-slate-300 mb-2">Username</label>
                <input type="text" formControlName="username" class="input-field text-14" placeholder="e.g. johndoe" required />
            </div>
            <div>
                <label class="block text-13 font-medium text-slate-300 mb-2">Password</label>
                <input type="password" formControlName="password" class="input-field text-14" placeholder="••••••••" required />
            </div>
            <button type="submit" [disabled]="!registerForm.valid" class="btn-primary mt-2 text-14">
                Register
            </button>
        </form>

        <p class="mt-6 text-center text-13 text-slate-400 relative z-10">
            Already have an account? <a routerLink="/login"
                class="text-indigo-400 hover:text-indigo-300 font-semibold transition-colors">Sign in</a>
        </p>
    </div>
</div>
